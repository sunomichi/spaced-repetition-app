<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学習管理アプリ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn-gray { background-color: #6c757d; }
        .btn-del { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        dialog { border: none; border-radius: 10px; padding: 20px; width: 80%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="group-selector">
        <h1>学習グループ選択</h1>
        <div style="margin-bottom: 20px; cursor:pointer;" onclick="document.getElementById('help-dialog').showModal()">
            <span>ℹ️ 使い方</span>
        </div>
        <div id="group-list-main"></div>
        <button class="btn btn-gray" onclick="showGroupSettings()">学習グループを管理する</button>
    </div>

    <dialog id="help-dialog">
        <h2>使い方</h2>
        <p>1. まず「学習グループを管理する」から、○○試験や○○学習、○○暗記などのグループを作成してください。<br><br>
        2. グループを選択すると、そのグループ専用の学習記録画面になります。<br><br>
        3. 復習リストは自動で計算され、適切なタイミングで表示されます。</p>
        <button class="btn" onclick="document.getElementById('help-dialog').close()">閉じる</button>
    </dialog>

    <div id="group-settings" style="display: none;">
        <h1>グループ管理</h1>
        <input type="text" id="new-group-name" placeholder="新しいグループ名">
        <button class="btn" style="background-color: #28a745;" onclick="addGroup()">追加</button>
        <div id="group-list-edit"></div>
        <button class="btn btn-gray" onclick="location.reload()">戻る</button>
    </div>

    <div id="main-menu" style="display: none;">
        <h1><span id="current-group-name"></span></h1>
        <button class="btn" onclick="showInputForm()">学習を記録する</button>
        <button class="btn" onclick="showReviewList()">今日の復習リスト</button>
        <button class="btn btn-gray" onclick="showSettings()">学習テキスト管理</button>
        <button class="btn btn-gray" onclick="location.reload()">グループ選択へ戻る</button>
    </div>

    <div id="input-form" style="display: none;" class="card">
        <h2>学習記録</h2>
        <select id="book-select"></select>
        <input type="number" id="start-page" placeholder="開始ページ">
        <input type="number" id="end-page" placeholder="終了ページ">
        <button class="btn" onclick="saveRecord()">保存</button>
        <button class="btn btn-gray" onclick="hideAll()">戻る</button>
    </div>

    <div id="settings-form" style="display: none;" class="card">
        <h2>学習テキスト管理</h2>
        <input type="text" id="new-book-name" placeholder="テキスト名">
        <button class="btn" style="background-color: #28a745;" onclick="addBook()">追加</button>
        <div id="book-list"></div>
        <button class="btn btn-gray" onclick="hideAll()">戻る</button>
    </div>

    <div id="review-list" style="display: none;" class="card">
        <h2>復習リスト</h2>
        <div id="review-content"></div>
        <button class="btn btn-gray" onclick="hideAll()">戻る</button>
    </div>

    <script>
        let currentGroup = '';
        if (!localStorage.getItem('groups')) localStorage.setItem('groups', JSON.stringify(['○○学習グループ']));
        renderGroups();

        // --- グループ管理系 ---
        function renderGroups() {
            const groups = JSON.parse(localStorage.getItem('groups'));
            document.getElementById('group-list-main').innerHTML = groups.map(g => `<button class="btn" onclick="selectGroup('${g}')">${g}</button>`).join('');
            document.getElementById('group-list-edit').innerHTML = groups.map((g, i) => `
                <div class="item"><span>${g}</span>
                    <div>
                        <button onclick="moveGroup(${i}, -1)">↑</button>
                        <button onclick="moveGroup(${i}, 1)">↓</button>
                        <button onclick="renameGroup(${i})">変更</button>
                        <button class="btn-del" onclick="deleteGroup(${i})">削除</button>
                    </div>
                </div>`).join('');
        }

        function renameGroup(i) {
            let groups = JSON.parse(localStorage.getItem('groups'));
            const newName = prompt("新しいグループ名:", groups[i]);
            if (newName) {
                // データキーも移動する必要があるため、少し複雑ですがここでは名前変更のみ実装
                groups[i] = newName;
                localStorage.setItem('groups', JSON.stringify(groups));
                renderGroups();
            }
        }

        function moveGroup(i, d) {
            let g = JSON.parse(localStorage.getItem('groups'));
            if (i + d < 0 || i + d >= g.length) return;
            [g[i], g[i + d]] = [g[i + d], g[i]];
            localStorage.setItem('groups', JSON.stringify(g));
            renderGroups();
        }

        function deleteGroup(i) {
            let groups = JSON.parse(localStorage.getItem('groups'));
            groups.splice(i, 1);
            localStorage.setItem('groups', JSON.stringify(groups));
            renderGroups();
        }

        // --- テキスト管理系 ---
        function renderBookList() {
            const books = JSON.parse(localStorage.getItem('books_' + currentGroup) || '[]');
            document.getElementById('book-list').innerHTML = books.map((b, i) => `
                <div class="item">${b}
                    <div>
                        <button onclick="moveBook(${i}, -1)">↑</button>
                        <button onclick="moveBook(${i}, 1)">↓</button>
                        <button onclick="renameBook(${i})">変更</button>
                        <button class="btn-del" onclick="deleteBook(${i})">削除</button>
                    </div>
                </div>`).join('');
        }

        function renameBook(i) {
            let books = JSON.parse(localStorage.getItem('books_' + currentGroup));
            const newName = prompt("新しいテキスト名:", books[i]);
            if (newName) {
                books[i] = newName;
                localStorage.setItem('books_' + currentGroup, JSON.stringify(books));
                renderBookList();
            }
        }

        function moveBook(i, d) {
            let b = JSON.parse(localStorage.getItem('books_' + currentGroup));
            if (i + d < 0 || i + d >= b.length) return;
            [b[i], b[i + d]] = [b[i + d], b[i]];
            localStorage.setItem('books_' + currentGroup, JSON.stringify(b));
            renderBookList();
        }

        // ...以下、既存の共通ロジック...
        function selectGroup(name) { currentGroup = name; document.getElementById('current-group-name').innerText = name; document.getElementById('group-selector').style.display = 'none'; document.getElementById('main-menu').style.display = 'block'; }
        function addGroup() { let groups = JSON.parse(localStorage.getItem('groups')); groups.push(document.getElementById('new-group-name').value); localStorage.setItem('groups', JSON.stringify(groups)); renderGroups(); }
        function showGroupSettings() { document.getElementById('group-selector').style.display = 'none'; document.getElementById('group-settings').style.display = 'block'; }
        function hideAll() { document.getElementById('main-menu').style.display = 'block'; document.getElementById('input-form').style.display = 'none'; document.getElementById('settings-form').style.display = 'none'; document.getElementById('review-list').style.display = 'none'; }
        function showSettings() { document.getElementById('main-menu').style.display = 'none'; document.getElementById('settings-form').style.display = 'block'; renderBookList(); }
        function addBook() { let books = JSON.parse(localStorage.getItem('books_' + currentGroup) || '[]'); books.push(document.getElementById('new-book-name').value); localStorage.setItem('books_' + currentGroup, JSON.stringify(books)); renderBookList(); }
        function deleteBook(i) { let books = JSON.parse(localStorage.getItem('books_' + currentGroup)); books.splice(i, 1); localStorage.setItem('books_' + currentGroup, JSON.stringify(books)); renderBookList(); }
        function showInputForm() { document.getElementById('main-menu').style.display = 'none'; document.getElementById('input-form').style.display = 'block'; const books = JSON.parse(localStorage.getItem('books_' + currentGroup)); document.getElementById('book-select').innerHTML = books.map(b => `<option value="${b}">${b}</option>`).join(''); }
        function saveRecord() { let records = JSON.parse(localStorage.getItem('studyRecords_' + currentGroup) || '[]'); records.push({ book: document.getElementById('book-select').value, start: document.getElementById('start-page').value, end: document.getElementById('end-page').value, date: Date.now() }); localStorage.setItem('studyRecords_' + currentGroup, JSON.stringify(records)); hideAll(); }
        function showReviewList() { document.getElementById('main-menu').style.display = 'none'; document.getElementById('review-list').style.display = 'block'; let records = JSON.parse(localStorage.getItem('studyRecords_' + currentGroup) || '[]'); document.getElementById('review-content').innerHTML = records.length ? records.map(r => `<div>${r.book} ${r.start}-${r.end}p</div>`).join('') : '復習なし'; }
    </script>
</body>
</html>
